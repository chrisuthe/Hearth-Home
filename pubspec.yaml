name: hearth
description: Smart home kiosk — Immich photos, HA controls, Music Assistant, Frigate cameras.
publish_to: 'none'
version: 0.3.2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4
  intl: ^0.19.0
  # Video playback for live camera streams via RTSP.
  # media_kit wraps libmpv — works on Windows, Linux x64, and Linux ARM64.
  # On Raspberry Pi with flutter-pi, swap to flutterpi_gstreamer_video_player
  # (same video_player API, uses GStreamer instead of mpv).
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_windows_video: ^1.0.10
  media_kit_libs_linux: ^1.1.3
  video_player: ^2.9.1
  weather_icons: ^3.0.0
  bonsoir: ^6.0.2
  ffi: ^2.2.0
  flutterpi_gstreamer_video_player: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
