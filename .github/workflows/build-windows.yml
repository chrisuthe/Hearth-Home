name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - run: flutter build windows --release

      # Bundle the release directory into a zip
      - name: Package build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath hearth-windows.zip

      # Always upload as a workflow artifact (downloadable from Actions tab)
      - uses: actions/upload-artifact@v4
        with:
          name: hearth-windows
          path: hearth-windows.zip

      # On version tags, create a GitHub Release with the zip attached
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: hearth-windows.zip
          generate_release_notes: true
