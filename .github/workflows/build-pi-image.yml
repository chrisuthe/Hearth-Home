name: Build Pi Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot version tag (e.g., 2024.11)'
        required: false
        default: '2024.11'

concurrency:
  group: pi-image-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDROOT_VERSION: ${{ github.event.inputs.buildroot_version || '2024.11' }}

jobs:
  build-bundle:
    name: Cross-compile Flutter bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'

      - name: Install flutterpi_tool
        run: dart pub global activate flutterpi_tool 0.10.1

      - name: Swap dependencies for Pi
        run: ./scripts/prepare-pi-build.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Cross-compile for Pi 5
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutterpi_tool build --release --arch=arm64 --cpu=pi4

      - name: Package bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          # Sanitize: branch names like task/screen-capture contain slashes
          # that break the tarball path. Collapse to dashes.
          VERSION="${VERSION//\//-}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          SRC_DIR=$(find build/flutter-pi -maxdepth 1 -type d ! -name flutter-pi | head -1)
          if [ -z "$SRC_DIR" ] || [ ! -f "$SRC_DIR/app.so" ]; then
            echo "ERROR: Could not find flutter-pi bundle"
            exit 1
          fi
          # Package the full flutterpi_tool output as-is (default layout).
          # Includes flutter-pi binary, libflutter_engine.so, app.so, and assets.
          tar czf "hearth-bundle-${VERSION}.tar.gz" -C "$SRC_DIR" .

      - name: Generate checksum
        run: |
          sha256sum hearth-bundle-*.tar.gz > hearth-bundle-${VERSION:-dev}.sha256

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearth-bundle
          path: |
            hearth-bundle-*.tar.gz
            hearth-bundle-*.sha256

  # Buildroot image build disabled — using Pi OS + setup script for now.
  # Re-enable when Buildroot defconfig is fully validated.

  release:
    name: Publish to GitHub Release
    needs: [build-bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hearth-bundle/hearth-bundle-*.tar.gz
            hearth-bundle/hearth-bundle-*.sha256
          generate_release_notes: true
