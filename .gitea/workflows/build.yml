name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath hearth-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: hearth-windows
          path: hearth-windows.zip
      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITEA_TOKEN: ${{ secrets.TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"${TAG}\", \"body\": \"Release ${TAG}\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          # Upload asset
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@hearth-windows.zip" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets"
