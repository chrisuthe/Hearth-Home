name: Build Pi Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot version tag (e.g., 2024.11)'
        required: false
        default: '2024.11'

concurrency:
  group: pi-image-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDROOT_VERSION: ${{ github.event.inputs.buildroot_version || '2024.11' }}

jobs:
  build-bundle:
    name: Cross-compile Flutter bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'

      - name: Install flutterpi_tool
        run: dart pub global activate flutterpi_tool 0.10.1

      - name: Swap dependencies for Pi
        run: ./scripts/prepare-pi-build.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Cross-compile for Pi 5
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutterpi_tool build --release --arch=arm64 --cpu=pi4

      - name: Package bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          BUNDLE_DIR=$(find build/flutter-pi -maxdepth 1 -type d ! -name flutter-pi | head -1)
          if [ -z "$BUNDLE_DIR" ] || [ ! -f "$BUNDLE_DIR/app.so" ]; then
            echo "ERROR: Could not find flutter-pi bundle (expected app.so in build/flutter-pi/*/)"
            find build -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "Packaging bundle from: $BUNDLE_DIR"
          tar czf "hearth-bundle-${VERSION}.tar.gz" -C "$BUNDLE_DIR" .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearth-bundle
          path: hearth-bundle-*.tar.gz

  # TODO: Buildroot image job disabled until defconfig is validated locally.
  # Re-enable once buildroot-hearth/configs/hearth_pi5_defconfig passes
  # `make hearth_pi5_defconfig && make` against Buildroot 2024.11.

  release:
    name: Publish to Gitea Release
    needs: [build-bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVER="${GITHUB_SERVER_URL}"
          REPO="${GITHUB_REPOSITORY}"

          # Create release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Hearth ${TAG}\", \"body\": \"Hearth ${TAG} release\"}" \
            "${SERVER}/api/v1/repos/${REPO}/releases" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)

          echo "Created release ID: ${RELEASE_ID}"

          # Upload bundle
          BUNDLE=$(ls hearth-bundle/hearth-bundle-*.tar.gz)
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@${BUNDLE}" \
            "${SERVER}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets"

          echo "Uploaded bundle to release ${TAG}"
