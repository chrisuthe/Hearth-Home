name: Build Pi Bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: pi-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-bundle:
    name: Cross-compile Flutter bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'

      - name: Install flutterpi_tool
        run: dart pub global activate flutterpi_tool 0.10.1

      - name: Swap dependencies for Pi
        run: ./scripts/prepare-pi-build.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Cross-compile for Pi 5
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutterpi_tool build --release --arch=arm64 --cpu=pi4

      - name: Package bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          SRC_DIR=$(find build/flutter-pi -maxdepth 1 -type d ! -name flutter-pi | head -1)
          if [ -z "$SRC_DIR" ] || [ ! -f "$SRC_DIR/app.so" ]; then
            echo "ERROR: Could not find flutter-pi bundle"
            exit 1
          fi
          tar czf "hearth-bundle-${VERSION}.tar.gz" -C "$SRC_DIR" .

  release:
    name: Publish to Gitea Release
    needs: [build-bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Create release and upload bundle
        env:
          GITEA_TOKEN: ${{ secrets.TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVER="${GITHUB_SERVER_URL}"
          REPO="${GITHUB_REPOSITORY}"

          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Hearth ${TAG}\", \"body\": \"Hearth ${TAG} release\"}" \
            "${SERVER}/api/v1/repos/${REPO}/releases" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)

          echo "Created release ID: ${RELEASE_ID}"

          BUNDLE=$(ls hearth-bundle-*.tar.gz 2>/dev/null)
          if [ -n "$BUNDLE" ]; then
            curl -s -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${BUNDLE}" \
              "${SERVER}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets"
            echo "Uploaded $BUNDLE"
          fi
