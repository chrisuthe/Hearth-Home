name: Build Pi Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot version tag (e.g., 2024.11)'
        required: false
        default: '2024.11'

concurrency:
  group: pi-image-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDROOT_VERSION: ${{ github.event.inputs.buildroot_version || '2024.11' }}

jobs:
  build:
    name: Build bundle and SD card image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # --- Flutter bundle ---
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'

      - name: Install flutterpi_tool
        run: dart pub global activate flutterpi_tool 0.10.1

      - name: Swap dependencies for Pi
        run: ./scripts/prepare-pi-build.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Cross-compile for Pi 5
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutterpi_tool build --release --arch=arm64 --cpu=pi4

      - name: Package bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          SRC_DIR=$(find build/flutter-pi -maxdepth 1 -type d ! -name flutter-pi | head -1)
          if [ -z "$SRC_DIR" ] || [ ! -f "$SRC_DIR/app.so" ]; then
            echo "ERROR: Could not find flutter-pi bundle"
            exit 1
          fi
          # Repackage into Buildroot's meta-flutter layout
          BUNDLE_DIR="hearth-bundle-staging"
          mkdir -p "$BUNDLE_DIR/lib" "$BUNDLE_DIR/data/flutter_assets"
          cp "$SRC_DIR/app.so" "$BUNDLE_DIR/lib/libapp.so"
          cp "$SRC_DIR/icudtl.dat" "$BUNDLE_DIR/data/" 2>/dev/null || true
          for item in AssetManifest.bin AssetManifest.json FontManifest.json NOTICES.Z NativeAssetsManifest.json version.json fonts packages shaders; do
            [ -e "$SRC_DIR/$item" ] && cp -r "$SRC_DIR/$item" "$BUNDLE_DIR/data/flutter_assets/"
          done
          tar czf "hearth-bundle-${VERSION}.tar.gz" -C "$BUNDLE_DIR" .

      # --- Buildroot image ---
      - name: Install Buildroot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc g++ make \
            libncurses-dev unzip bc python3 \
            cpio rsync wget file bzip2 \
            dosfstools mtools libssl-dev perl

      - name: Download Buildroot
        run: |
          wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz"
          tar xf "buildroot-${BUILDROOT_VERSION}.tar.xz"

      - name: Inject Flutter bundle into overlay
        run: |
          BUNDLE_TAR=$(ls hearth-bundle-*.tar.gz)
          mkdir -p buildroot-hearth/board/hearth-pi5/overlay/opt/hearth/bundle
          tar xzf "$BUNDLE_TAR" -C buildroot-hearth/board/hearth-pi5/overlay/opt/hearth/bundle/

      - name: Configure Buildroot
        run: |
          cd "buildroot-${BUILDROOT_VERSION}"
          make BR2_EXTERNAL="${GITHUB_WORKSPACE}/buildroot-hearth" hearth_pi5_defconfig

      - name: Build image
        env:
          HEARTH_VERSION: ${{ github.ref_name }}
        run: |
          cd "buildroot-${BUILDROOT_VERSION}"
          make -j$(nproc)

      - name: Compress image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          cp "buildroot-${BUILDROOT_VERSION}/output/images/sdcard.img" .
          xz -3 -T0 sdcard.img
          mv sdcard.img.xz "hearth-${VERSION}-pi5.img.xz"

  release:
    name: Publish to Gitea Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVER="${GITHUB_SERVER_URL}"
          REPO="${GITHUB_REPOSITORY}"

          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"Hearth ${TAG}\", \"body\": \"Hearth ${TAG} release\"}" \
            "${SERVER}/api/v1/repos/${REPO}/releases" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)

          echo "Created release ID: ${RELEASE_ID}"

          for asset in hearth-bundle-*.tar.gz hearth-*-pi5.img.xz; do
            if [ -f "$asset" ]; then
              curl -s -X POST \
                -H "Authorization: token ${GITEA_TOKEN}" \
                -F "attachment=@${asset}" \
                "${SERVER}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets"
              echo "Uploaded $asset"
            fi
          done
